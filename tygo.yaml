# tygo — Go struct → TypeScript type generation.
#
# Run via `make types` from the repo root. Output files are committed
# so the web app builds without requiring tygo to be installed. CI
# runs `make check-types` which verifies the committed files match
# a fresh generation (catches drift between Go and TS).

packages:
  - path: clinlang/pkg/engine
    output_path: web/src/lib/types-engine.ts
    type_mappings:
      "any": "unknown"
    fallback_type: "unknown"
    frontmatter: |
      // Code generated by tygo from pkg/engine. DO NOT EDIT BY HAND.
      // Regenerate via `make types`.

      /* eslint-disable */
  - path: clinlang/pkg/workspace
    output_path: web/src/lib/types-workspace.ts
    type_mappings:
      "any": "unknown"
    fallback_type: "unknown"
    frontmatter: |
      // Code generated by tygo from pkg/workspace. DO NOT EDIT BY HAND.
      // Regenerate via `make types`.

      /* eslint-disable */
  - path: clinlang/pkg/autocomplete
    output_path: web/src/lib/types-autocomplete.ts
    type_mappings:
      "any": "unknown"
    fallback_type: "unknown"
    frontmatter: |
      // Code generated by tygo from pkg/autocomplete. DO NOT EDIT BY HAND.
      // Regenerate via `make types`.

      /* eslint-disable */
